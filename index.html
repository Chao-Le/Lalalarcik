<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LALALARчик</title>
    <!-- PWA REQUIREMENTS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E75480"> <!-- You can change this hex code to match your new app's color -->
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary: #CE82FF;
            --success: #58CC02;
            --error: #FF4B4B;
            --bg: #F7F7F7;
            --text: #3C3C3C;
            --card-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Views */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .view.active { display: flex; }

        /* Header */
        header {
            text-align: center;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        h1 { font-size: 24px; margin: 0; color: var(--text); }

        /* Progress Dashboard */
        .progress-dashboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr) auto;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid #E5E5E5;
            text-align: center;
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 900; color: var(--primary); }

        /* Dashboard Buttons */
        #btn-go {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 16px;
            box-shadow: 0 4px 0 #46a302;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        #btn-go:active { transform: translateY(2px); box-shadow: 0 2px 0 #46a302; }

        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            border: 2px solid #E5E5E5;
        }
               table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* Forces the table to strictly respect the 100% width */
        }
        
        /* Define specific widths for each column so 'Score' doesn't take up too much space */
        th:nth-child(1), td:nth-child(1) { width: 40%; } /* Turkish */
        th:nth-child(2), td:nth-child(2) { width: 43%; } /* Russian */
        th:nth-child(3), td:nth-child(3) { width: 17%; } /* Score */

        th, td {
            padding: 12px 8px; /* Reduced horizontal padding from 12px to 8px to give text more room */
            word-wrap: break-word; /* Allows long words to wrap to the next line instead of stretching the table */
            overflow-wrap: break-word;
        }

        th { text-align: left; background: #fdfdfd; border-bottom: 2px solid #E5E5E5; position: sticky; top: 0; }
        td { border-bottom: 1px solid #F0F0F0; }
        tr:nth-child(even) { background-color: #FAFAFA; }
        .score-pill {
            background: #E5E5E5;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
            font-weight: bold;
        }

        /* Quiz UI */
        .progress-bar {
            height: 12px;
            background: #E5E5E5;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-inner {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        #question-card {
            flex-grow: 0;
            min-height: 20vh; /* Reduced vertical height */
            background: white;
            border-radius: 24px;
            border: 2px solid #E5E5E5;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; /* Reduced padding */
            margin-bottom: 20px;
            text-align: center;
            font-size: 35px;
            font-weight: bold;
            cursor: default;
        }
        #question-card.clickable { cursor: pointer; }
        #question-card.correct { background: var(--success); color: white; border-color: var(--success); }
        #question-card.wrong { background: var(--error); color: white; border-color: var(--error); }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: white;
            border: 2px solid #E5E5E5;
            border-radius: 16px;
            padding: 16px;
            font-size: 25px;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: all 0.1s;
            text-align: center;
        }
        .option-btn.correct-alt { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong-alt { background: var(--error); color: white; border-color: var(--error); }

        /* Summary */
        .summary-content {
            text-align: center;
            margin-top: 50px;
        }
        .big-score { font-size: 64px; font-weight: 900; color: var(--primary); margin: 20px 0; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        const DEFAULT_EFACTOR = 2.5;

        /** 2. PERSISTENCE & PARSING **/
        function initData() {
            let saved = localStorage.getItem('flashcard_stats_lalalar');
if (!saved) saved = localStorage.getItem('flashcard_stats'); // Rescue old data
            const statsMap = saved ? JSON.parse(saved) : {};

            dictionary = rawCSV.trim().split('\n').map(line => {
                const [tr, en] = line.split(',').map(item => item.trim());
                const stat = statsMap[tr] || {
                    interval: 0,
                    repetition: 0,
                    efactor: DEFAULT_EFACTOR,
                    correctCount: 0,
                    nextReviewDate: 0
                };
                return { tr, en, ...stat };
            });
            renderDashboard();
        }

        function saveData() {
            const statsMap = {};
            dictionary.forEach(card => {
                statsMap[card.tr] = {
                    interval: card.interval,
                    repetition: card.repetition,
                    efactor: card.efactor,
                    correctCount: card.correctCount,
                    nextReviewDate: card.nextReviewDate
                };
            });
            localStorage.setItem('flashcard_stats_lalalar', JSON.stringify(statsMap));
        }

        /** 3. SM-2 ALGORITHM **/
        function updateSM2(card, quality) {
            if (quality >= 3) {
                if (card.repetition === 0) {
                    card.interval = 1;
                } else if (card.repetition === 1) {
                    card.interval = 6;
                } else {
                    card.interval = Math.round(card.interval * card.efactor);
                }
                card.repetition++;
                card.correctCount++;
            } else {
                card.repetition = 0;
                card.interval = 1;
            }

            card.efactor = card.efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
            if (card.efactor < 1.3) card.efactor = 1.3;

            const now = Date.now();
            card.nextReviewDate = now + (card.interval * 24 * 60 * 60 * 1000);
        }

        /** 4. TTS ENGINE **/
        function speakTurkish(text) {
            if (!window.speechSynthesis) return;
            
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'tr-TR';
            msg.rate = 0.95;
            msg.volume = 1.0;

            const voices = window.speechSynthesis.getVoices();
            
            let trVoice = voices.find(v => v.lang === 'tr-TR' && v.name.includes('Google')) ||
                         voices.find(v => v.lang === 'tr-TR' && v.localService) ||
                         voices.find(v => v.lang === 'tr-TR') ||
                         voices.find(v => v.lang.startsWith('tr')) ||
                         voices.find(v => v.name.toLowerCase().includes('turkish'));

            if (trVoice) {
                msg.voice = trVoice;
                msg.lang = trVoice.lang;
            }

            window.speechSynthesis.speak(msg);
        }

            document.getElementById('stat-3').innerText = counts[3];
            document.getElementById('stat-4').innerText = counts[4];
            document.getElementById('stat-5plus').innerText = counts["5+"];
document.getElementById('stat-total').innerText = ' / ' + dictionary.length;
        }

        function startSession() {
            const now = Date.now();
            const DAY_MS = 24 * 60 * 60 * 1000;
            
            // 1. Separate into New, Due, and Future Review piles
            let newPile = dictionary.filter(c => c.nextReviewDate === 0)
                                    .sort(() => Math.random() - 0.5);

            let dueReviews = dictionary.filter(c => c.nextReviewDate > 0 && c.nextReviewDate <= now)
                                       .sort((a, b) => a.nextReviewDate - b.nextReviewDate);

            let futureReviews = dictionary.filter(c => {
                if (c.nextReviewDate <= now) return false;
                
                // Enforce the strict 24-hour lockout rule
                // We calculate when it was last played based on the SM-2 interval
                const lastPlayed = c.nextReviewDate - (c.interval * DAY_MS);
                const timeSincePlayed = now - lastPlayed;
                
// Only allow as a fallback if it's been at least 12 hours since last seen
return timeSincePlayed >= (12 * 60 * 60 * 1000);
            }).sort((a, b) => a.nextReviewDate - b.nextReviewDate); // Sort closest to due first

            // 2. Select initial targets (6 new, 4 review)
            let selectedNew = newPile.splice(0, 6);
            
            let selectedReview = dueReviews.splice(0, 4);
            
            // Fallback: If less than 4 due, grab the closest future reviews
            if (selectedReview.length < 4) {
                const needed = 4 - selectedReview.length;
                selectedReview = selectedReview.concat(futureReviews.splice(0, needed));
            }

            // 3. Balance to reach exactly 10 words if possible
            let totalSelected = selectedNew.length + selectedReview.length;
            
            // If we lack reviews (e.g., brand new account), fill the rest with new words
            if (totalSelected < 10 && newPile.length > 0) {
                const needed = 10 - totalSelected;
                selectedNew = selectedNew.concat(newPile.splice(0, needed));
            }
            
            // If we lack new words (e.g., finished the dictionary), fill the rest with more reviews
            totalSelected = selectedNew.length + selectedReview.length;
            if (totalSelected < 10) {
                const needed = 10 - totalSelected;
                // Take from remaining due reviews first
                const extraDue = dueReviews.splice(0, needed);
                selectedReview = selectedReview.concat(extraDue);
                
                // If STILL need more, take from remaining unlocked future reviews
                const stillNeeded = needed - extraDue.length;
                if (stillNeeded > 0) {
                    selectedReview = selectedReview.concat(futureReviews.splice(0, stillNeeded));
                }
            }

            let selected = [...selectedNew, ...selectedReview];

            // Edge case: User has literally played every valid card within the last 24 hours
            if (selected.length === 0) {
                alert("You've reviewed everything available! Come back in 24 hours to let your memory consolidate.");
                return;
            }

            // 4. Final shuffle so new and review words are mixed up
            sessionQueue = selected.sort(() => Math.random() - 0.5)
                                   .map(card => ({ ...card, firstTry: true }));
            
            sessionResults.total = sessionQueue.length;
            sessionResults.firstTryCorrect = 0;
            
                history.pushState({page: 'quiz'}, '', '');  // ADD THIS LINE

            switchView('view-quiz');
            nextQuestion();
        }

        function nextQuestion() {
            if (sessionQueue.length === 0) {
                showSummary();
                return;
            }

            isLocked = false;
            currentCard = sessionQueue[0];
            const qCard = document.getElementById('question-card');
            const qText = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');

            qCard.className = 'fade-in';
            optionsContainer.innerHTML = '';

            const isTrToEn = Math.random() > 0.5;
            const questionValue = isTrToEn ? currentCard.tr : currentCard.en;
            const correctValue = isTrToEn ? currentCard.en : currentCard.tr;
            
            qText.innerText = questionValue;

            let distractors = dictionary
                .filter(c => c.tr !== currentCard.tr)
                .sort(() => 0.5 - Math.random())
                .slice(0, 4)
                .map(c => isTrToEn ? c.en : c.tr);
            
            let options = [...distractors, correctValue].sort(() => 0.5 - Math.random());

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt === correctValue, btn, isTrToEn);
                optionsContainer.appendChild(btn);
            });

            updateProgressBar();
        }

        function handleAnswer(isCorrect, btn, isTrToEn) {
            if (isLocked) return;
            isLocked = true;

            const qCard = document.getElementById('question-card');
            const correctValue = isTrToEn ? currentCard.en : currentCard.tr;
            
            const buttons = document.querySelectorAll('.option-btn');
            let correctBtn;
            buttons.forEach(b => { if (b.innerText === correctValue) correctBtn = b; });

            speakTurkish(currentCard.tr);

            if (isCorrect) {
                qCard.classList.add('correct');
                btn.classList.add('correct-alt');
                if (currentCard.firstTry) sessionResults.firstTryCorrect++;
                
                const originalInDict = dictionary.find(d => d.tr === currentCard.tr);
                updateSM2(originalInDict, 5);
                
                sessionQueue.shift();
            } else {
                qCard.classList.add('wrong');
                btn.classList.add('wrong-alt');
                correctBtn.classList.add('correct-alt');
                
                const originalInDict = dictionary.find(d => d.tr === currentCard.tr);
                updateSM2(originalInDict, 0);

                currentCard.firstTry = false;
                sessionQueue.shift();
                sessionQueue.push(currentCard);
            }

            qCard.classList.add('clickable');
            qCard.onclick = () => {
                qCard.onclick = null;
                qCard.classList.remove('clickable', 'correct', 'wrong');
                nextQuestion();
            };
        }

        function updateProgressBar() {
            const totalInSession = sessionResults.total;
            const finished = totalInSession - sessionQueue.filter(c => c.firstTry).length;
            const percent = (finished / totalInSession) * 100;
            document.getElementById('progress-inner').style.width = `${percent}%`;
        }

        function showSummary() {
            saveData();
            renderDashboard();
            document.getElementById('summary-score').innerText = `${sessionResults.firstTryCorrect} / ${sessionResults.total}`;
            switchView('view-summary');
        }

        /** 6. INIT **/
        function loadVoices() {
            window.speechSynthesis.getVoices();
        }

        window.onload = () => {
            initData();
            loadVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = loadVoices;
            }
        };

        document.getElementById('btn-go').onclick = startSession;
        document.getElementById('btn-home').onclick = () => switchView('view-home');

    </script>
